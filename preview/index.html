<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brew Studio — Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0F0A06;color:#F5EDE0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
h1{font-family:'Fraunces',serif;font-size:42px;font-weight:400;color:#D4A24E;margin-bottom:6px;text-align:center}
p{color:rgba(245,237,224,.4);font-size:13px;margin-bottom:40px;text-align:center;letter-spacing:.5px}
.cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:500px}
.card{flex:1;min-width:200px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:32px 24px;text-align:center;text-decoration:none;color:#F5EDE0;transition:all .25s}
.card:hover{background:rgba(212,162,78,.08);border-color:rgba(212,162,78,.2);transform:translateY(-4px);box-shadow:0 12px 40px rgba(212,162,78,.12)}
.card__emoji{font-size:48px;margin-bottom:16px;display:block}
.card__title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:6px;color:#E8B85E}
.card__desc{font-size:12px;color:rgba(245,237,224,.4);line-height:1.6}
.pin{margin-top:24px;font-size:11px;color:rgba(245,237,224,.2);text-align:center}
.pin b{color:#D4A24E}
</style>
</head>
<body>
<h1>Brew Studio</h1>
<p>เลือกหน้าที่ต้องการทดสอบ</p>
<div class="cards">
  <a href="owner.html" class="card">
    <span class="card__emoji">👨‍💼</span>
    <div class="card__title">Owner Dashboard</div>
    <div class="card__desc">จัดการเมนู หมวดหมู่<br>ตั้งค่าร้าน ดูบันทึก</div>
  </a>
  <a href="staff.html" class="card">
    <span class="card__emoji">👩‍🍳</span>
    <div class="card__title">Staff App</div>
    <div class="card__desc">ดูสูตรเมนู ส่วนผสม<br>วิธีทำ (PIN: 1234)</div>
  </a>
</div>
<div class="pin">Firebase Project: <b>coffex-d1b96</b></div>
</body>
</html>
