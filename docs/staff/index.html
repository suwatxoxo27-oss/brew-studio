<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Brew Studio — Staff</title>
  <meta name="theme-color" content="#1A1410">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══ PIN LOGIN ═══ -->
  <div id="pinScreen" class="pin-screen">
    <div class="pin-glow pin-glow--1"></div>
    <div class="pin-glow pin-glow--2"></div>
    <div class="pin-logo-wrap">
      <img class="pin-logo" id="pinLogo" alt="">
      <div class="pin-brand text-display" id="pinBrand">Brew ✦</div>
      <div class="pin-tagline">Recipe Studio</div>
    </div>
    <div class="pin-card">
      <div class="pin-heading">ใส่ PIN เพื่อดูสูตร</div>
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot"></span><span class="pin-dot"></span>
        <span class="pin-dot"></span><span class="pin-dot"></span>
      </div>
      <div class="pin-error" id="pinError"></div>
      <div class="numpad" id="numpad">
        <button class="num-key" onclick="pressKey('1')">1</button>
        <button class="num-key" onclick="pressKey('2')">2</button>
        <button class="num-key" onclick="pressKey('3')">3</button>
        <button class="num-key" onclick="pressKey('4')">4</button>
        <button class="num-key" onclick="pressKey('5')">5</button>
        <button class="num-key" onclick="pressKey('6')">6</button>
        <button class="num-key" onclick="pressKey('7')">7</button>
        <button class="num-key" onclick="pressKey('8')">8</button>
        <button class="num-key" onclick="pressKey('9')">9</button>
        <button class="num-key num-key--empty"></button>
        <button class="num-key" onclick="pressKey('0')">0</button>
        <button class="num-key num-key--del" onclick="pressDelete()">⌫</button>
      </div>
    </div>
    <div class="pin-name-wrap" id="pinNameWrap" style="display:none">
      <div class="pin-name-label">ชื่อของคุณ</div>
      <input class="input input--dark" id="staffNameInput" placeholder="ใส่ชื่อเล่น" maxlength="50">
      <button class="btn btn--primary btn--full" onclick="submitStaffName()">เข้าสู่ระบบ</button>
    </div>
  </div>

  <!-- ═══ MAIN APP ═══ -->
  <div id="staffApp" class="staff-app" style="display:none">

    <!-- HEADER -->
    <header class="header">
      <!-- Decorative orbs -->
      <div class="header__orb header__orb--1"></div>
      <div class="header__orb header__orb--2"></div>

      <!-- Nav row -->
      <div class="header__nav">
        <div class="header__brand-wrap">
          <div class="header__logo-box">
            <img class="header__logo-img" id="heroLogo" alt="">
            <span class="header__logo-letter">B</span>
          </div>
          <div>
            <div class="header__brand" id="heroBrand">Brew ✦</div>
            <div class="header__greet" id="staffGreet">สวัสดี 👋</div>
          </div>
        </div>
        <button class="header__logout" onclick="staffLogout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>

      <!-- Title + count -->
      <div class="header__content">
        <div class="header__title" id="heroGreet" style="display:none"></div>
        <h1 class="header__headline">
          <span id="heroLine1">สูตรเมนู</span><span class="header__gold" id="heroLine1b">ทั้งหมด</span>
        </h1>
        <span id="heroLine2" style="display:none">ของเรา</span>
        <div class="header__meta">
          <span class="header__dot"></span>
          <span><b id="menuCount">0</b> สูตร</span>
          <span class="header__sep">·</span>
          <span>อัพเดทล่าสุด</span>
        </div>
      </div>

      <!-- Search -->
      <div class="header__search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="7"/><path d="M21 21l-5.2-5.2"/></svg>
        <input type="text" id="staffSearch" placeholder="ค้นหาเมนู..." oninput="staffRenderMenus()">
      </div>
    </header>

    <!-- Category Chips -->
    <div class="staff-cat-bar" id="staffCatBar"></div>

    <!-- Menu Grid -->
    <div class="staff-grid" id="staffGrid"></div>

    <!-- Footer -->
    <div class="staff-footer">
      <div class="staff-footer__text">Powered by <strong>Brew Studio</strong></div>
    </div>
  </div>

  <!-- ═══ RECIPE DETAIL MODAL ═══ -->
  <div class="overlay" id="recipeModal">
    <div class="sheet recipe-sheet">
      <div class="sheet__handle" onclick="closeRecipe()"></div>
      <div class="recipe-top-close" onclick="closeRecipe()">
        <span>ปิด</span>
      </div>
      <div class="recipe-image-wrap" id="recipeImageWrap">
        <img class="recipe-image" id="recipeImage" alt="">
        <button class="recipe-close" onclick="closeRecipe()">✕</button>
      </div>
      <div class="recipe-body">
        <div class="recipe-category" id="recipeCategory"></div>
        <div class="recipe-name text-display" id="recipeName"></div>
        <div class="recipe-desc" id="recipeDesc"></div>
        <div class="recipe-section" id="ingredientsSection" style="display:none">
          <div class="recipe-section__title text-label">ส่วนผสม</div>
          <ul class="recipe-ingredients" id="recipeIngredients"></ul>
        </div>
        <div class="recipe-section" id="stepsSection" style="display:none">
          <div class="recipe-section__title text-label">วิธีทำ</div>
          <ol class="recipe-steps" id="recipeSteps"></ol>
        </div>
        <div class="recipe-note" id="recipeNote" style="display:none">
          <div class="recipe-note__title">💡 หมายเหตุ</div>
          <div class="recipe-note__text" id="recipeNoteText"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Fullscreen Image Viewer -->
  <div class="img-viewer" id="imgViewer" onclick="closeFullImage()">
    <button class="img-viewer__close" onclick="closeFullImage()">✕</button>
    <img class="img-viewer__img" id="imgViewerImg" alt="">
    <div class="img-viewer__hint">แตะเพื่อปิด</div>
  </div>

  <script>
  function openFullImage(src) {
    if (!src) return;
    document.getElementById('imgViewerImg').src = src;
    document.getElementById('imgViewer').classList.add('img-viewer--open');
    document.body.style.overflow = 'hidden';
  }
  function closeFullImage() {
    document.getElementById('imgViewer').classList.remove('img-viewer--open');
    document.body.style.overflow = '';
  }
  // Touch-friendly: attach to recipe image after DOM ready
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('recipeImage').addEventListener('click', function(e) {
      e.stopPropagation();
      if (this.src && this.src !== window.location.href) openFullImage(this.src);
    });
    // Also handle touch
    document.getElementById('recipeImage').addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (this.src && this.src !== window.location.href) openFullImage(this.src);
    }, {passive: false});
  });
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
