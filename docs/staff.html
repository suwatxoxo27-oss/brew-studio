<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brew Studio — Staff</title>
<meta name="theme-color" content="#1A1410">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F0A06;--bg2:#1A1410;--bg3:#241D14;
  --card:rgba(255,255,255,.04);--card2:rgba(255,255,255,.07);
  --text:#F5EDE0;--text2:rgba(245,237,224,.55);--text3:rgba(245,237,224,.25);
  --amber:#D4A24E;--amber2:#E8B85E;--amber-bg:rgba(212,162,78,.08);
  --amber-border:rgba(212,162,78,.18);--amber-glow:rgba(212,162,78,.3);
  --green:#6DB87A;--red:#D05A4C;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --cream:#F8F5EF;--cream2:#EDE6D8;--ink:#1A1410;--dim:#9C8E7C;
  --display:'Fraunces',Georgia,serif;
  --body:'Plus Jakarta Sans',-apple-system,sans-serif;
  --r1:10px;--r2:16px;--r3:24px;--r4:32px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--body);font-size:15px;color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;max-width:430px;margin:0 auto;position:relative;line-height:1.5}
@media(min-width:431px){body{box-shadow:0 0 120px rgba(212,162,78,.06)}}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:var(--text)}
input{font-family:var(--body);font-size:15px;outline:none}
img{display:block;max-width:100%}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ═══ PIN SCREEN ═══ */
.pin{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:24px}
.pin::before{content:'';position:absolute;width:450px;height:450px;border-radius:50%;background:radial-gradient(circle,rgba(212,162,78,.1) 0%,transparent 70%);top:-140px;right:-120px}
.pin::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(139,100,32,.08) 0%,transparent 70%);bottom:8%;left:-80px}
.pin__brand{font-family:var(--display);font-size:42px;font-weight:400;color:var(--amber);margin-bottom:4px;position:relative;z-index:1;animation:fadeD .6s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeD{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
.pin__sub{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:5px;text-transform:uppercase;margin-bottom:40px;position:relative;z-index:1;animation:fadeD .6s .1s cubic-bezier(.16,1,.3,1) both}
.pin__card{position:relative;z-index:1;width:100%;max-width:300px;animation:fadeU .5s .15s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.pin__heading{text-align:center;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:22px}
.pin__dots{display:flex;justify-content:center;gap:16px;margin-bottom:14px}
.pin__dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(212,162,78,.2);transition:all .2s ease}
.pin__dot--filled{background:var(--amber);border-color:var(--amber);transform:scale(1.15);box-shadow:0 0 14px var(--amber-glow)}
.pin__dot--wrong{border-color:var(--red);animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}
.pin__error{text-align:center;color:var(--red);font-size:13px;min-height:20px;margin-bottom:8px;font-weight:600}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
.num-key{height:62px;border-radius:var(--r2);font-size:24px;font-weight:400;font-family:var(--display);color:rgba(245,237,224,.9);background:var(--card);border:1px solid var(--border);transition:all .15s;position:relative;overflow:hidden}
.num-key::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(212,162,78,.15),transparent 70%);opacity:0;transition:opacity .2s}
.num-key:active{transform:scale(.94)}.num-key:active::after{opacity:1}
.num-key--empty{background:transparent;border:none;pointer-events:none}
.num-key--del{font-size:18px;color:var(--text3);background:transparent;border:none}
.pin__name{position:relative;z-index:1;width:100%;max-width:300px;margin-top:28px;animation:fadeU .3s cubic-bezier(.16,1,.3,1) both}
.pin__name-label{text-align:center;color:var(--text2);font-size:13px;margin-bottom:14px}
.pin__name input{width:100%;background:var(--card);border:1.5px solid var(--amber-border);border-radius:var(--r1);padding:14px 16px;font-size:16px;color:var(--text);text-align:center;transition:all .2s;margin-bottom:14px}
.pin__name input::placeholder{color:var(--text3)}
.pin__name input:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-bg)}
.pin__name-btn{width:100%;padding:14px;border-radius:var(--r1);background:linear-gradient(135deg,var(--amber),#8B6420);color:#fff;font-size:15px;font-weight:700;box-shadow:0 4px 20px var(--amber-glow);transition:all .2s}
.pin__name-btn:active{transform:scale(.97)}

/* ═══ STAFF APP ═══ */
.app{display:none;background:var(--cream);color:var(--ink);min-height:100vh;padding-bottom:40px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── TOPBAR (STICKY) ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(26,20,16,.95);backdrop-filter:blur(32px) saturate(1.4);-webkit-backdrop-filter:blur(32px) saturate(1.4);border-bottom:1px solid rgba(212,162,78,.08)}
.topbar__inner{display:flex;align-items:center;padding:10px 18px;gap:12px}
.topbar__logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--amber),#8B6420);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:17px;font-weight:700;color:#fff;box-shadow:0 2px 10px var(--amber-glow);flex-shrink:0}
.topbar__body{flex:1;min-width:0}
.topbar__brand{font-family:var(--display);font-size:18px;font-weight:500;color:var(--amber2);letter-spacing:-.3px;line-height:1.2}
.topbar__greet{font-size:11px;color:var(--text2);font-weight:500;margin-top:1px}
.topbar__logout{height:32px;padding:0 16px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--text3);border:1px solid var(--border2);transition:all .15s;text-transform:uppercase;display:flex;align-items:center}
.topbar__logout:active{background:rgba(255,255,255,.04);transform:scale(.95)}

/* ── HERO SECTION ── */
.hero{background:var(--bg2);padding:24px 20px 28px;position:relative;overflow:hidden}
/* decorative amber mesh */
.hero::before{content:'';position:absolute;top:-60px;right:-40px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(212,162,78,.08) 0%,transparent 65%);animation:drift 8s ease-in-out infinite alternate}
.hero::after{content:'';position:absolute;bottom:-30px;left:-20px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(139,100,32,.06) 0%,transparent 65%);animation:drift 6s 2s ease-in-out infinite alternate-reverse}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(12px,-8px)}}
.hero__text{position:relative;z-index:1;margin-bottom:20px}
.hero__title{font-family:var(--display);font-size:32px;font-weight:400;line-height:1.15;color:rgba(245,237,224,.92);animation:fadeU .5s .1s cubic-bezier(.16,1,.3,1) both}
.hero__gold{color:var(--amber2)}
.hero__count{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:5px 14px;border-radius:20px;background:rgba(212,162,78,.1);border:1px solid rgba(212,162,78,.12);font-size:11px;font-weight:700;color:var(--amber2);letter-spacing:.5px;animation:fadeU .5s .2s cubic-bezier(.16,1,.3,1) both}
.hero__count-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber-glow)}
/* search inside hero */
.hero__search{position:relative;z-index:1;animation:fadeU .5s .25s cubic-bezier(.16,1,.3,1) both}
.hero__search-box{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--r2);padding:12px 16px;transition:all .25s}
.hero__search-box:focus-within{border-color:var(--amber);background:rgba(212,162,78,.06);box-shadow:0 0 0 3px rgba(212,162,78,.08),0 4px 20px rgba(212,162,78,.08)}
.hero__search-box svg{flex-shrink:0;color:var(--text3)}
.hero__search-box input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--text);font-weight:400}
.hero__search-box input::placeholder{color:var(--text3)}
/* smooth bottom curve */
.hero-curve{height:24px;background:var(--cream);margin-top:-1px;position:relative}
.hero-curve::before{content:'';position:absolute;top:-24px;left:0;right:0;height:24px;background:var(--bg2);border-radius:0 0 28px 28px}

/* ── CHIPS ── */
.chips{padding:8px 20px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:9px 18px;border-radius:30px;font-size:12.5px;font-weight:600;color:var(--dim);background:#fff;border:1.5px solid var(--cream2);transition:all .2s;white-space:nowrap}
.chip--on{background:var(--ink);color:var(--amber2);border-color:var(--ink);box-shadow:0 2px 12px rgba(26,20,16,.15)}
.chip:active{transform:scale(.96)}

/* ── GRID ── */
.s-grid{padding:14px 20px 0;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.r-card{background:#fff;border-radius:var(--r3);overflow:hidden;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.02);transition:all .25s;animation:rise .5s cubic-bezier(.16,1,.3,1) both;border:1px solid rgba(0,0,0,.03)}
.r-card:nth-child(1){animation-delay:0s}.r-card:nth-child(2){animation-delay:.04s}.r-card:nth-child(3){animation-delay:.08s}.r-card:nth-child(4){animation-delay:.12s}.r-card:nth-child(5){animation-delay:.16s}.r-card:nth-child(6){animation-delay:.2s}.r-card:nth-child(7){animation-delay:.24s}.r-card:nth-child(8){animation-delay:.28s}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.r-card:active{transform:scale(.97)}
.r-card__vis{width:100%;aspect-ratio:1;position:relative;overflow:hidden}
.r-card__bg{position:absolute;inset:0;transition:transform .5s cubic-bezier(.16,1,.3,1)}
.r-card:hover .r-card__bg{transform:scale(1.08)}
.r-card__emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:46px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.12));transition:transform .3s ease}
.r-card:hover .r-card__emoji{transform:scale(1.1) rotate(-3deg)}
.r-card__shade{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to top,rgba(26,20,16,.5) 0%,transparent 100%)}
.r-card__tag{position:absolute;top:9px;left:9px;background:rgba(0,0,0,.4);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:20px;padding:4px 10px;font-size:9px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.6px;text-transform:uppercase}
.r-card__info{padding:12px 14px 14px}
.r-card__name{font-family:var(--display);font-size:15px;font-weight:500;line-height:1.3;margin-bottom:3px;color:var(--ink);letter-spacing:-.2px}
.r-card__desc{font-size:11px;color:var(--dim);line-height:1.45}

/* Footer */
.s-footer{padding:28px 20px 0;text-align:center}
.s-footer__text{font-size:11px;color:var(--dim)}.s-footer__text strong{color:var(--amber);font-weight:700}

/* ═══ RECIPE MODAL ═══ */
.ov{position:fixed;inset:0;z-index:500;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.ov--open{display:flex}
.r-sheet{background:var(--cream);border-radius:var(--r4) var(--r4) 0 0;width:100%;max-width:430px;max-height:96vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,32px);animation:sheetUp .35s cubic-bezier(.16,1,.3,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.r-sheet__bar{width:40px;height:4px;background:var(--cream2);border-radius:3px;margin:14px auto 0}
.r-hero{width:100%;aspect-ratio:4/3;position:relative;overflow:hidden}
.r-hero__bg{position:absolute;inset:0}
.r-hero__grad{position:absolute;inset:0;background:linear-gradient(to top,var(--cream) 0%,rgba(248,245,239,.3) 40%,transparent 100%)}
.r-hero__emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.2))}
.r-close{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;border:1px solid rgba(255,255,255,.08)}
.r-close:active{transform:scale(.88)}
.r-body{padding:0 24px 28px;position:relative;margin-top:-20px}
.r-cat{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.r-title{font-family:var(--display);font-size:28px;font-weight:400;line-height:1.15;margin-bottom:6px;color:var(--ink);letter-spacing:-.3px}
.r-desc{color:var(--dim);font-size:14px;line-height:1.65;margin-bottom:24px}
.r-sec{margin-bottom:24px}
.r-sec__title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.r-sec__title::after{content:'';flex:1;height:1px;background:var(--cream2)}
.ing-list{list-style:none}
.ing-list li{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--cream2);font-size:15px;color:var(--ink)}
.ing-list li:last-child{border-bottom:none}
.ing-name{flex:1}.ing-amt{color:var(--amber);font-weight:700;text-align:right;margin-left:12px;font-family:var(--display);font-size:16px}
.step-list{list-style:none;counter-reset:step}
.step-list li{counter-increment:step;display:flex;gap:14px;margin-bottom:16px;line-height:1.7;font-size:15px;color:var(--ink)}
.step-list li::before{content:counter(step);flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--ink);color:var(--amber2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--display);margin-top:1px}
.r-note{background:rgba(212,162,78,.06);border:1px solid rgba(212,162,78,.12);border-radius:var(--r2);padding:16px 18px}
.r-note__title{font-weight:700;font-size:12px;margin-bottom:4px;color:var(--amber);letter-spacing:.3px}
.r-note__text{font-size:14px;color:var(--dim);line-height:1.65}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--amber2);padding:11px 22px;border-radius:999px;font-size:13px;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.16,1,.3,1);box-shadow:0 8px 32px rgba(0,0,0,.3);white-space:nowrap}
.toast--on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin" id="pinScreen">
  <div class="pin__brand">Brew</div>
  <div class="pin__sub">Recipe Studio</div>
  <div class="pin__card" id="pinCard">
    <div class="pin__heading" id="pinHeading">ใส่ PIN เพื่อดูสูตร</div>
    <div class="pin__dots" id="pinDots"><div class="pin__dot"></div><div class="pin__dot"></div><div class="pin__dot"></div><div class="pin__dot"></div></div>
    <div class="pin__error" id="pinError"></div>
    <div class="numpad" id="numpad">
      <button class="num-key" onclick="pressKey('1')">1</button><button class="num-key" onclick="pressKey('2')">2</button><button class="num-key" onclick="pressKey('3')">3</button>
      <button class="num-key" onclick="pressKey('4')">4</button><button class="num-key" onclick="pressKey('5')">5</button><button class="num-key" onclick="pressKey('6')">6</button>
      <button class="num-key" onclick="pressKey('7')">7</button><button class="num-key" onclick="pressKey('8')">8</button><button class="num-key" onclick="pressKey('9')">9</button>
      <button class="num-key num-key--empty"></button><button class="num-key" onclick="pressKey('0')">0</button><button class="num-key num-key--del" onclick="pressDel()">⌫</button>
    </div>
  </div>
  <div class="pin__name" id="pinName" style="display:none">
    <div class="pin__name-label">ชื่อของคุณ</div>
    <input id="nameInput" placeholder="ใส่ชื่อเล่น" maxlength="50">
    <button class="pin__name-btn" onclick="enterApp()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- STAFF APP -->
<div class="app" id="staffApp">

  <!-- STICKY TOPBAR -->
  <div class="topbar">
    <div class="topbar__inner">
      <div class="topbar__logo">B</div>
      <div class="topbar__body">
        <div class="topbar__brand">Brew</div>
        <div class="topbar__greet">สวัสดี, <span id="staffName">น้ำหวาน</span> 👋</div>
      </div>
      <button class="topbar__logout" onclick="logout()">ออก</button>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero__text">
      <div class="hero__title">ค้นหา<span class="hero__gold">สูตรเมนู</span><br>ที่ต้องการ</div>
      <div class="hero__count"><span class="hero__count-dot"></span><span id="totalCount">8</span> สูตรพร้อมเสิร์ฟ</div>
    </div>
    <div class="hero__search">
      <div class="hero__search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="7"/><path d="M21 21l-5.2-5.2"/></svg>
        <input type="text" placeholder="พิมพ์ชื่อเมนู หรือวัตถุดิบ..." oninput="filterStaff(this.value)">
      </div>
    </div>
  </div>
  <div class="hero-curve"></div>

  <!-- CHIPS -->
  <div class="chips" id="chips">
    <button class="chip chip--on" onclick="chipPick(this,null)">ทั้งหมด</button>
    <button class="chip" onclick="chipPick(this,'coffee')">☕ กาแฟ</button>
    <button class="chip" onclick="chipPick(this,'tea')">🍵 ชา</button>
    <button class="chip" onclick="chipPick(this,'blend')">🥤 ปั่น</button>
    <button class="chip" onclick="chipPick(this,'special')">✨ พิเศษ</button>
  </div>

  <!-- GRID -->
  <div class="s-grid" id="sGrid"></div>

  <div class="s-footer"><div class="s-footer__text">Powered by <strong>Brew Studio</strong></div></div>
</div>

<!-- RECIPE DETAIL -->
<div class="ov" id="recipeOv">
  <div class="r-sheet">
    <div class="r-sheet__bar"></div>
    <div class="r-hero" id="rHero">
      <div class="r-hero__bg" id="rHeroBg"></div>
      <div class="r-hero__grad"></div>
      <div class="r-hero__emoji" id="rIcon"></div>
      <button class="r-close" onclick="closeRecipe()">✕</button>
    </div>
    <div class="r-body">
      <div class="r-cat" id="rCat"></div>
      <div class="r-title" id="rTitle"></div>
      <div class="r-desc" id="rDesc"></div>
      <div class="r-sec" id="ingSec"><div class="r-sec__title">ส่วนผสม</div><ul class="ing-list" id="ingList"></ul></div>
      <div class="r-sec" id="stepSec"><div class="r-sec__title">วิธีทำ</div><ol class="step-list" id="stepList"></ol></div>
      <div class="r-note" id="noteSec"><div class="r-note__title">💡 หมายเหตุ</div><div class="r-note__text" id="noteText"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

let staffCat=null;

function updateDots(){document.querySelectorAll('#pinDots .pin__dot').forEach((d,i)=>{d.className='pin__dot'+(i<buf.length?' pin__dot--filled':'')})}
function pressKey(k){if(buf.length>=4)return;buf+=k;updateDots();if(buf.length===4)checkPin()}
function pressDel(){buf=buf.slice(0,-1);updateDots();document.getElementById('pinError').textContent=''}
function checkPin(){
  if(buf===PIN){
    document.getElementById('numpad').style.display='none';
    document.getElementById('pinDots').style.display='none';
    document.getElementById('pinHeading').textContent='PIN ถูกต้อง ✓';
    document.getElementById('pinHeading').style.color='#6DB87A';
    document.getElementById('pinName').style.display='block';
    setTimeout(()=>document.getElementById('nameInput').focus(),300);
  }else{
    document.getElementById('pinError').textContent='PIN ไม่ถูกต้อง';
    document.querySelectorAll('.pin__dot').forEach(d=>d.classList.add('pin__dot--wrong'));
    setTimeout(()=>{buf='';updateDots()},400);
  }
}
function enterApp(){
  const n=document.getElementById('nameInput').value.trim();if(!n)return;
  document.getElementById('staffName').textContent=n;
  document.getElementById('pinScreen').style.display='none';
  document.getElementById('staffApp').style.display='block';
  document.body.style.background='var(--cream)';
  renderStaff();
}
function logout(){
  document.getElementById('staffApp').style.display='none';
  document.getElementById('pinScreen').style.display='flex';
  document.body.style.background='var(--bg)';
  buf='';updateDots();
  document.getElementById('numpad').style.display='grid';
  document.getElementById('pinDots').style.display='flex';
  document.getElementById('pinHeading').textContent='ใส่ PIN เพื่อดูสูตร';
  document.getElementById('pinHeading').style.color='';
  document.getElementById('pinName').style.display='none';
  document.getElementById('nameInput').value='';
}
function renderStaff(q=''){
  const g=document.getElementById('sGrid');
  let items=MENUS;
  if(staffCat)items=items.filter(m=>m.cat===staffCat);
  if(q)items=items.filter(m=>m.name.toLowerCase().includes(q.toLowerCase())||m.desc.includes(q));
  document.getElementById('totalCount').textContent=items.length;
  g.innerHTML=items.map((m,i)=>`<div class="r-card" style="animation-delay:${i*.04}s" onclick="openRecipe(${m.id})"><div class="r-card__vis"><div class="r-card__bg" style="background:radial-gradient(circle at 40% 40%,hsla(${m.hue},40%,75%,.4),hsla(${m.hue},25%,55%,.15))"></div><div class="r-card__emoji">${m.icon}</div><div class="r-card__shade"></div><span class="r-card__tag">${m.tag}</span></div><div class="r-card__info"><div class="r-card__name">${m.name}</div><div class="r-card__desc">${m.desc}</div></div></div>`).join('');
}
function filterStaff(v){renderStaff(v)}
function chipPick(el,cat){staffCat=cat;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip--on'));el.classList.add('chip--on');renderStaff()}
function openRecipe(id){
  const m=MENUS.find(x=>x.id===id);if(!m)return;
  document.getElementById('rHeroBg').style.background=`radial-gradient(circle at 40% 40%,hsla(${m.hue},40%,75%,.35),hsla(${m.hue},20%,50%,.15))`;
  document.getElementById('rIcon').textContent=m.icon;
  document.getElementById('rCat').textContent=m.tag;
  document.getElementById('rTitle').textContent=m.name;
  document.getElementById('rDesc').textContent=m.desc;
  const ings=m.ing||[];
  if(ings.length){document.getElementById('ingSec').style.display='block';document.getElementById('ingList').innerHTML=ings.map(i=>`<li><span class="ing-name">${i.n}</span><span class="ing-amt">${i.a} ${i.u}</span></li>`).join('')}else{document.getElementById('ingSec').style.display='none'}
  const steps=m.steps||[];
  if(steps.length){document.getElementById('stepSec').style.display='block';document.getElementById('stepList').innerHTML=steps.map(s=>`<li>${s}</li>`).join('')}else{document.getElementById('stepSec').style.display='none'}
  if(m.note){document.getElementById('noteSec').style.display='block';document.getElementById('noteText').textContent=m.note}else{document.getElementById('noteSec').style.display='none'}
  document.getElementById('recipeOv').classList.add('ov--open');
}
function closeRecipe(){document.getElementById('recipeOv').classList.remove('ov--open')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('toast--on');setTimeout(()=>t.classList.remove('toast--on'),2200)}
document.querySelectorAll('.ov').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('ov--open')})});
</script>
